<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="#0F1F2E"/>

  <!-- Outer ring track -->
  <circle cx="512" cy="512" r="400" fill="none"
    stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="32"/>

  <!-- Outer arc ~75% (CPU echo) -->
  <circle cx="512" cy="512" r="400" fill="none"
    stroke="#4FC3F7" stroke-width="32" stroke-linecap="round"
    stroke-dasharray="1885 628"
    transform="rotate(-90 512 512)"/>

  <!-- Inner ring track -->
  <circle cx="512" cy="512" r="280" fill="none"
    stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="28"/>

  <!-- Inner arc ~55% (MEM echo) -->
  <circle cx="512" cy="512" r="280" fill="none"
    stroke="#FFB74D" stroke-width="28" stroke-linecap="round"
    stroke-dasharray="967 792"
    transform="rotate(-90 512 512)"/>

  <!-- Center dot -->
  <circle cx="512" cy="512" r="110" fill="#E8F4FD"/>
</svg>
